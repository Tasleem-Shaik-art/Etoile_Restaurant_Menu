{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Order Summary</title>
    <style>
        /* Professional Restaurant Styling */
        :root {
            --primary-blue: #1a2a6c;
            --accent-orange: #e67e22;
            --bg-gray: #f8f9fa;
            --text-dark: #333;
        }

        body {
            background-color: var(--bg-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .receipt-container {
            background: #ffffff;
            width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: var(--primary-blue);
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 1.6rem;
        }

        .receipt-divider {
            border: 0;
            border-top: 2px dashed #eee;
            margin: 20px 0;
        }

        .order-list {
            list-style: none;
            padding: 0;
            text-align: left;
            margin: 20px 0;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: var(--text-dark);
            font-size: 1.1rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-orange);
            margin: 20px 0;
        }

        .btn-print {
            background-color: #f1f1f1;
            color: #333;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-print:hover {
            background-color: #e2e2e2;
            transform: translateY(-1px);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #777;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-blue);
        }

        /* Hide buttons when printing */
        @media print {
            .btn-print, .back-link {
                display: none;
            }
            .receipt-container {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>

    <div class="receipt-container">
        <h2>Order Summary</h2>
        <hr class="receipt-divider">
        
        <ul class="order-list">
            {% for item in items %}
            <li class="order-item">
                <span>{{ item.name }}</span>
                <strong>${{ item.price }}</strong>
            </li>
            {% empty %}
            <li class="order-item" style="justify-content: center; color: #999;">
                No items selected
            </li>
            {% endfor %}
        </ul>

        <hr class="receipt-divider">
        
        <div class="total-row">
            <span>Total:</span>
            <span>${{ total }}</span>
        </div>

        <button onclick="window.print()" class="btn-print">
            Print Receipt
        </button>
        
        <a href="{% url 'menu' %}" class="back-link">← Back to Menu</a>
    </div>

</body>
</html>
